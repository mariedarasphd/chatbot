<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatbot</title>

<style>
  body { font-family: Arial, sans-serif; }
  #chatbox {
    width: 100%;
    max-width: 400px;
    height: 400px;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-y: scroll;
  }
  #userInput { width: 75%; }
  #sendBtn { width: 20%; }
  .user { color: blue; margin: 5px 0; }
  .bot { color: green; margin: 5px 0; }
</style>
</head>

<body>

<h3>Ask Me About My Services</h3>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type a question..." />
<button id="sendBtn">Send</button>

<script>
window.onload = function() {

  let chatbox = document.getElementById('chatbox');
  let userInput = document.getElementById('userInput');
  let sendBtn = document.getElementById('sendBtn');

  let faq = [];

  // ✅ LOAD YOUR JSON
  fetch('https://raw.githubusercontent.com/mariedarasphd/chatbot/main/faq.json')
    .then(response => response.json())
    .then(data => {
      faq = data;
      chatbox.innerHTML += "<div class='bot'>Chatbot is ready. Ask me a question.</div>";
      console.log("FAQ loaded:", faq);
    })
    .catch(err => {
      chatbox.innerHTML += "<div class='bot'>Error loading knowledge base.</div>";
      console.error(err);
    });

  // ✅ SMART MATCHING FUNCTION
  function findAnswer(userQuestion) {
    userQuestion = userQuestion.toLowerCase();

    for (let item of faq) {
      let questions = Array.isArray(item.question) ? item.question : [item.question];

      for (let q of questions) {
        let qLower = q.toLowerCase();

        if (
          userQuestion.includes(qLower) ||
          qLower.includes(userQuestion) ||
          userQuestion.split(" ").some(word => qLower.includes(word))
        ) {
          return item.answer;
        }
      }
    }

    return "I don't have that answer yet. Please use the contact form.";
  }

  // ✅ SEND BUTTON
  sendBtn.addEventListener('click', () => {
    let userText = userInput.value.trim();
    if (!userText) return;

    chatbox.innerHTML += `<div class="user"><strong>You:</strong> ${userText}</div>`;
    userInput.value = '';

    let answer = findAnswer(userText);

    chatbox.innerHTML += `<div class="bot"><strong>Bot:</strong> ${answer}</div>`;
    chatbox.scrollTop = chatbox.scrollHeight;
  });

  // ✅ ENTER KEY SUPPORT
  userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendBtn.click();
    }
  });

};
</script>

</body>
</html>
