<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatbot Widget</title>
<style>
  body { font-family: Arial, sans-serif; }
  #chatbox { width: 300px; height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; }
  #userInput { width: 80%; }
  #sendBtn { width: 18%; }
  .message { margin: 5px 0; }
  .user { color: blue; }
  .bot { color: green; }
</style>
</head>
<body>

<h3>Ask Me About My Services</h3>
<div id="chatbox"></div>
<input type="text" id="userInput" placeholder="Type a question..." />
<button id="sendBtn">Send</button>

<script src="chatbot.js"></script> <!-- or inline your JS -->
</body>
</html>
